<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta | Venéra</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; color: #333; margin: 0; background-color: #f8f9fa; }
    </style>
</head>
<body>

    <div style="max-width: 600px; margin: 0 auto; background: white; padding: 30px; min-height: 100vh;">
        
        <header style="margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px;">
            <a href="index.html" style="text-decoration: none; color:	#AD9084; font-weight: bold;">
                <i class="bi bi-arrow-left"></i> Volver al inicio
            </a>
            <h1 style="color: #B9AC99;">Crear cuenta</h1>
            
        </header>

        <main>
            <form action="index.html">
                
                <fieldset style="border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px;">
                    <legend style="color: #AD9084; font-weight: bold;">Datos Personales</legend>

                    <label><i class="bi bi-person-fill"></i> Nombre:</label><br>
                    <input type="text" placeholder="Tu nombre aquí" required style="width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box;">

                    <label><i class="bi bi-person"></i> Apellido:</label><br>
                    <input type="text" placeholder="Tu apellido aqui" required style="width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box;">

                    <label><i class="bi bi-envelope-at-fill"></i> Correo Electrónico:</label><br>
                    <input type="email" placeholder="ejemplo@gmail.com" required style="width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box;">

                    <label><i class="bi bi-lock"></i> Contraseña:</label><br>
                    <input type="text" placeholder="" required style="width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box;">

                    <label><i class="bi bi-telephone-fill"></i> Teléfono:</label><br>
                    <input type="tel" placeholder="+51 999 999 999" style="width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box;">
                </fieldset>

               
                <button type="submit" style="width: 100%; background-color: #B9AC99; color: white; padding: 15px; font-size: 18px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                     Registarse
                </button>

            </form>
        </main>

    </div>

</body>
</html>
